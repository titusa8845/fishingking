<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>義方金魚王：海洋世界排行版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-1: #fbbf24; --neon-2: #cbd5e1; --neon-3: #d97706;
            --neon-4: #38bdf8; --neon-5: #a855f7; --neon-6: #f43f5e;
            --neon-7: #10b981; --neon-8: #6366f1; --neon-9: #ec4899;
            --neon-10: #94a3b8;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(to bottom, #020617 0%, #0c4a6e 100%);
            color: #f1f5f9;
            min-height: 100vh;
            overflow-x: hidden;
            margin: 0;
        }
        .oswald { font-family: 'Oswald', sans-serif; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- 領獎台容器 --- */
        .podium-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 10px;
            height: 450px;
            margin-bottom: 20px;
            padding: 0 10px;
            position: relative;
            z-index: 10;
        }

        .podium-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            width: 9%;
            min-width: 60px;
            height: 100%;
        }

        /* 只有長條圖本身，取消搖擺 */
        .bar-wrapper {
            width: 100%;
            height: 320px;
            flex-shrink: 0; /* 防止 flex 壓縮，確保所有 column bar 等高基準 */
            position: relative;
            background: transparent;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            overflow: hidden;
        }

        /* 移除原有的晃動錯開設定 */
        .rank-column-2 .bar-wrapper, 
        .rank-column-3 .bar-wrapper, 
        .rank-column-4 .bar-wrapper, 
        .rank-column-1 .bar-wrapper { 
            animation: none; 
        }

        .bar-fill {
            width: 100%;
            height: 0;
            background: linear-gradient(to top, rgba(255,255,255,0.15), currentColor);
            box-shadow: 0 0 25px currentColor;
            transition: height 1.5s cubic-bezier(0.19, 1, 0.22, 1);
            animation: fadeIn 0.5s ease forwards;
            position: absolute; bottom: 0;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }

        /* 氣泡能量上升特效 */
        .bar-fill::after {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.5) 15%, transparent 15%);
            background-size: 25px 40px;
            animation: bubbleRise 3s infinite linear;
            opacity: 0.4;
        }

        @keyframes bubbleRise {
            0% { background-position: 0 100%; }
            100% { background-position: 0 0%; }
        }

        /* --- Tailwind 替代 CSS --- */
        * { box-sizing: border-box; }
        html, body { padding: 0; }

        .max-w-\[1400px\] { max-width: 1400px; }
        .mx-auto { margin-left: auto; margin-right: auto; }
        .p-4 { padding: 1rem; }
        .p-6 { padding: 1.5rem; }
        .p-8 { padding: 2rem; }
        .px-8 { padding-left: 2rem; padding-right: 2rem; }
        .px-20 { padding-left: 5rem; padding-right: 5rem; }
        .py-6 { padding-top: 1.5rem; padding-bottom: 1.5rem; }
        .py-8 { padding-top: 2rem; padding-bottom: 2rem; }
        .py-10 { padding-top: 2.5rem; padding-bottom: 2.5rem; }
        .py-16 { padding-top: 4rem; padding-bottom: 4rem; }
        .py-4 { padding-top: 1rem; padding-bottom: 1rem; }
        .py-5 { padding-top: 1.25rem; padding-bottom: 1.25rem; }
        .pl-1 { padding-left: 0.25rem; }
        .pr-1 { padding-right: 0.25rem; }

        .text-center { text-align: center; }
        .text-white { color: white; }
        .text-slate-300 { color: #cbd5e1; }
        .text-slate-400 { color: #94a3b8; }
        .text-slate-500 { color: #64748b; }
        .text-slate-900 { color: #0f172a; }
        .text-cyan-300 { color: #06b6d4; }
        .text-cyan-400 { color: #06d6e9; }
        .text-yellow-100 { color: #fef3c7; }
        .text-yellow-400 { color: #facc15; }
        .text-red-400 { color: #f87171; }
        .text-slate-950 { color: #020617; }

        .bg-cyan-400 { background-color: #06d6e9; }
        .bg-cyan-500 { background-color: #0284c7; }
        .bg-cyan-600 { background-color: #0369a1; }
        .bg-slate-700 { background-color: #334155; }
        .bg-slate-800 { background-color: #1e293b; }
        .bg-slate-950 { background-color: #020617; }
        .bg-yellow-400 { background-color: #facc15; }
        .bg-yellow-500 { background-color: #eab308; }
        .bg-red-600 { background-color: #dc2626; }
        .bg-red-950 { background-color: #7c2d12; }
        .bg-white { background-color: white; }

        .border { border: 1px solid currentColor; }
        .border-2 { border-width: 2px; }
        .border-4 { border-width: 4px; }
        .border-cyan-400 { border-color: #06d6e9; }
        .border-slate-700 { border-color: #334155; }
        .border-white { border-color: white; }
        .border-red-500 { border-color: #ef4444; }

        .rounded-2xl { border-radius: 1rem; }
        .rounded-3xl { border-radius: 1.5rem; }
        .rounded-\[30px\] { border-radius: 30px; }
        .rounded-\[40px\] { border-radius: 40px; }
        .rounded-\[50px\] { border-radius: 50px; }
        .rounded-\[80px\] { border-radius: 80px; }
        .rounded-full { border-radius: 9999px; }

        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .gap-4 { gap: 1rem; }
        .gap-6 { gap: 1.5rem; }
        .gap-10 { gap: 2.5rem; }
        .gap-12 { gap: 3rem; }

        .grid { display: grid; }
        .grid-cols-1 { grid-template-columns: repeat(1, minmax(0, 1fr)); }
        .grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .col-span-full { grid-column: 1 / -1; }

        .w-full { width: 100%; }
        .w-24 { width: 6rem; }
        .w-2 { width: 0.5rem; }
        .min-w-\[200px\] { min-width: 200px; }
        .h-8 { height: 2rem; }
        .h-24 { height: 6rem; }
        .h-\[15rem\] { height: 15rem; }

        .font-bold { font-weight: 700; }
        .font-black { font-weight: 900; }
        .text-2xl { font-size: 1.5rem; line-height: 2rem; }
        .text-3xl { font-size: 1.875rem; line-height: 2.25rem; }
        .text-4xl { font-size: 2.25rem; line-height: 2.5rem; }
        .text-5xl { font-size: 3rem; line-height: 1; }
        .text-6xl { font-size: 3.75rem; line-height: 1; }
        .text-7xl { font-size: 4.5rem; line-height: 1; }
        .text-8xl { font-size: 6rem; line-height: 1; }
        .text-9xl { font-size: 8rem; line-height: 1; }
        .text-\[12px\] { font-size: 12px; }
        .text-\[15rem\] { font-size: 15rem; }

        .mb-2 { margin-bottom: 0.5rem; }
        .mb-3 { margin-bottom: 0.75rem; }
        .mb-6 { margin-bottom: 1.5rem; }
        .mb-8 { margin-bottom: 2rem; }
        .mb-10 { margin-bottom: 2.5rem; }
        .mb-12 { margin-bottom: 3rem; }
        .mb-20 { margin-bottom: 5rem; }
        .mb-24 { margin-bottom: 6rem; }
        .mt-8 { margin-top: 2rem; }
        .mt-10 { margin-top: 2.5rem; }
        .mt-24 { margin-top: 6rem; }
        .ml-6 { margin-left: 1.5rem; }
        .mx-auto { margin-left: auto; margin-right: auto; }

        .hidden { display: none; }
        .block { display: block; }
        .inline-block { display: inline-block; }
        .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .uppercase { text-transform: uppercase; }
        .italic { font-style: italic; }
        .tracking-tighter { letter-spacing: -0.05em; }
        .tracking-\[0.4em\] { letter-spacing: 0.4em; }
        .tracking-\[0.5em\] { letter-spacing: 0.5em; }
        .leading-none { line-height: 1; }

        .bg-clip-text { background-clip: text; -webkit-background-clip: text; }
        .text-transparent { color: transparent; }
        .bg-gradient-to-b { background-image: linear-gradient(to bottom, var(--tw-gradient-stops)); }
        .from-yellow-100 { --tw-gradient-stops: #fef3c7, var(--tw-gradient-to, transparent); }
        .to-yellow-500 { --tw-gradient-to: #eab308; }

        .drop-shadow-2xl { filter: drop-shadow(0 25px 25px rgba(0, 0, 0, 0.25)); }
        .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .shadow-2xl { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }

        .inset-0 { inset: 0; }
        .fixed { position: fixed; }
        .absolute { position: absolute; }
        .relative { position: relative; }
        .top-0 { top: 0; }
        .bottom-0 { bottom: 0; }
        .left-0 { left: 0; }
        .right-0 { right: 0; }
        .bottom-32 { bottom: 8rem; }
        .pb-32 { padding-bottom: 8rem; }

        .z-\[1000\] { z-index: 1000; }
        .z-\[2000\] { z-index: 2000; }
        .z-10 { z-index: 10; }
        .z-\[-2\] { z-index: -2; }
        .z-\[-1\] { z-index: -1; }

        .backdrop-blur-xl { backdrop-filter: blur(20px); }
        .backdrop-blur-2xl { backdrop-filter: blur(40px); }
        .backdrop-blur-3xl { backdrop-filter: blur(64px); }

        .outline-none { outline: 2px solid transparent; outline-offset: 2px; }
        .transition-all { transition-property: all; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }
        .active\:scale-95:active { transform: scale(0.95); }

        .hover\:bg-cyan-400:hover { background-color: #06d6e9; }
        .hover\:bg-red-500:hover { background-color: #ef4444; }
        .hover\:bg-white\/10:hover { background-color: rgba(255, 255, 255, 0.1); }

        .focus\:border-cyan-400:focus { border-color: #06d6e9; }

        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .space-y-12 > * + * { margin-top: 3rem; }

        .pb-32 { padding-bottom: 8rem; }

        /* === 選人面板系統（移植自羽毛球借球系統）=== */
        .fish-panel {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            animation: fishPanelIn 0.25s ease;
            text-align: left;
        }

        @keyframes fishPanelIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .fish-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .fish-panel-label {
            font-size: 13px;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .fish-change-btn {
            font-size: 13px;
            font-weight: 700;
            color: #2563eb;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
        }

        .fish-selected-info {
            font-size: 26px;
            font-weight: 800;
            color: #111827;
            text-align: center;
            padding: 8px 0;
        }

        /* 班級卡牌：6 個一列 */
        .class-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
        }

        .class-btn {
            padding: 22px 12px;
            font-size: 22px;
            font-weight: 700;
            border: 3px solid #e5e7eb;
            border-radius: 16px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            color: #374151;
        }

        .class-btn:hover {
            border-color: #2563eb;
            background: #dbeafe;
            transform: translateY(-2px);
        }

        .class-btn:active { transform: translateY(0); }

        /* 學生卡牌：10 列網格 */
        .student-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
        }

        .student-btn {
            padding: 16px 10px;
            font-size: 22px;
            font-weight: 600;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            color: #374151;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .student-btn:hover {
            border-color: #2563eb;
            background: #dbeafe;
        }

        .student-btn:active { transform: scale(0.97); }

        .seat {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
            height: 32px;
            background: #dbeafe;
            color: #2563eb;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }

        /* Toast 通知 */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: rgba(0, 0, 0, 0.95);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            z-index: 9999;
            animation: slideIn 0.3s ease-out;
            max-width: 400px;
            word-wrap: break-word;
        }

        .toast.success { border-left: 4px solid #10b981; }
        .toast.error { border-left: 4px solid #ef4444; }
        .toast.info { border-left: 4px solid #0284c7; }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* 前三名閃爍動畫 */
        @keyframes glowGold {
            0%, 100% { text-shadow: 0 0 8px rgba(251,191,36,0.4), 0 0 16px rgba(251,191,36,0.2); filter: brightness(1); }
            50%       { text-shadow: 0 0 20px rgba(251,191,36,1), 0 0 40px rgba(251,191,36,0.7), 0 0 60px rgba(251,191,36,0.4); filter: brightness(1.4); }
        }
        @keyframes glowSilver {
            0%, 100% { text-shadow: 0 0 8px rgba(148,163,184,0.4); filter: brightness(1); }
            50%       { text-shadow: 0 0 20px rgba(148,163,184,1), 0 0 40px rgba(148,163,184,0.6); filter: brightness(1.3); }
        }
        @keyframes glowBronze {
            0%, 100% { text-shadow: 0 0 8px rgba(180,83,9,0.4); filter: brightness(1); }
            50%       { text-shadow: 0 0 20px rgba(180,83,9,1), 0 0 40px rgba(217,119,6,0.6); filter: brightness(1.3); }
        }
        .glow-rank-1 { animation: glowGold   1.8s ease-in-out infinite; }
        .glow-rank-2 { animation: glowSilver 2.2s ease-in-out infinite; }
        .glow-rank-3 { animation: glowBronze 2.0s ease-in-out infinite; }

        /* 固定名次標籤 */
        .rank-label {
            font-family: 'Oswald', sans-serif;
            font-size: 2.8rem;
            font-weight: 900;
            opacity: 1;
            height: 60px;
            flex-shrink: 0; /* 防止 flex 壓縮 */
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            text-shadow: 0 0 8px currentColor, 0 0 20px currentColor, 0 0 2px #fff;
        }

        .neon-1  { color: var(--neon-1);  text-shadow: 0 0 8px var(--neon-1),  0 0 20px var(--neon-1),  0 0 2px #fff; }
        .neon-2  { color: var(--neon-2);  text-shadow: 0 0 8px var(--neon-2),  0 0 20px var(--neon-2),  0 0 2px #fff; }
        .neon-3  { color: var(--neon-3);  text-shadow: 0 0 8px var(--neon-3),  0 0 20px var(--neon-3),  0 0 2px #fff; }
        .neon-4  { color: var(--neon-4);  text-shadow: 0 0 8px var(--neon-4),  0 0 20px var(--neon-4),  0 0 2px #fff; }
        .neon-5  { color: var(--neon-5);  text-shadow: 0 0 8px var(--neon-5),  0 0 20px var(--neon-5),  0 0 2px #fff; }
        .neon-6  { color: var(--neon-6);  text-shadow: 0 0 8px var(--neon-6),  0 0 20px var(--neon-6),  0 0 2px #fff; }
        .neon-7  { color: var(--neon-7);  text-shadow: 0 0 8px var(--neon-7),  0 0 20px var(--neon-7),  0 0 2px #fff; }
        .neon-8  { color: var(--neon-8);  text-shadow: 0 0 8px var(--neon-8),  0 0 20px var(--neon-8),  0 0 2px #fff; }
        .neon-9  { color: var(--neon-9);  text-shadow: 0 0 8px var(--neon-9),  0 0 20px var(--neon-9),  0 0 2px #fff; }
        .neon-10 { color: var(--neon-10); text-shadow: 0 0 8px var(--neon-10), 0 0 20px var(--neon-10), 0 0 2px #fff; }

        .rank-1-column .bar-fill { filter: brightness(1.3); box-shadow: 0 0 45px var(--neon-1); }

        /* --- 動態海洋與海浪 --- */
        #fishBackground { position: fixed; inset: 0; z-index: -2; overflow: hidden; pointer-events: none; }
        .bg-fish { position: absolute; white-space: nowrap; user-select: none; opacity: 0.5; will-change: transform; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); }
        @keyframes swimLeft { from { transform: translateX(110vw) scaleX(-1); } to { transform: translateX(-20vw) scaleX(-1); } }
        @keyframes swimRight { from { transform: translateX(-20vw); } to { transform: translateX(110vw); } }
        @keyframes bobbing { 0%, 100% { margin-top: 0; } 50% { margin-top: -15px; } }

        /* --- 經典 SVG 海浪 --- */
        .wave-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 120px; z-index: -1; pointer-events: none; }
        .waves { position: relative; width: 100%; height: 100%; }
        .parallax > use { animation: move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite; }
        .parallax > use:nth-child(1) { animation-delay: -2s; animation-duration: 7s; }
        .parallax > use:nth-child(2) { animation-delay: -3s; animation-duration: 10s; }
        .parallax > use:nth-child(3) { animation-delay: -4s; animation-duration: 13s; }
        .parallax > use:nth-child(4) { animation-delay: -5s; animation-duration: 20s; }
        @keyframes move-forever { 0% { transform: translate3d(-90px,0,0); } 100% { transform: translate3d(85px,0,0); } }

        /* 獎牌卡彈出動畫 */
        @keyframes medalPop {
            0%   { opacity: 0; transform: scale(0.5); }
            60%  { transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes medalFade {
            0%   { opacity: 1; }
            100% { opacity: 0; transform: scale(0.9); }
        }
        .medal-card-enter { animation: medalPop 0.4s ease-out forwards; }
        .medal-card-exit  { animation: medalFade 0.5s ease-in forwards; }

        /* 標題金光閃閃動畫 */
        @keyframes goldGlow {
            0%, 100% {
                text-shadow:
                    0 0 10px rgba(251, 191, 36, 0.4),
                    0 0 20px rgba(251, 191, 36, 0.2);
                filter: brightness(1);
            }
            50% {
                text-shadow:
                    0 0 20px rgba(251, 191, 36, 0.8),
                    0 0 40px rgba(251, 191, 36, 0.5),
                    0 0 60px rgba(251, 191, 36, 0.3);
                filter: brightness(1.3);
            }
        }
        .title-glow {
            animation: goldGlow 2.5s ease-in-out infinite;
        }

        /* 廣播字卡 - 淡入 → 停留 → 淡出 */
        @keyframes cardTransition {
            0%   { transform: scale(0.95); opacity: 0; }
            10%  { transform: scale(1); opacity: 1; }
            90%  { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0; }
        }
        .broadcast-marquee {
            background: linear-gradient(90deg, rgba(6, 182, 212, 0.1) 0%, rgba(6, 182, 212, 0.3) 50%, rgba(6, 182, 212, 0.1) 100%);
            border-top: 2px solid rgba(6, 182, 212, 0.5);
            border-bottom: 2px solid rgba(6, 182, 212, 0.5);
            padding: 12px 16px;
            overflow: visible;
            margin: 16px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 50px;
        }
        .broadcast-text {
            display: inline-block;
            white-space: normal;
            text-align: center;
            font-size: 2.75rem;
            font-weight: bold;
            color: #06b6d4;
            animation: cardTransition 5s ease-in-out forwards;
            max-width: 90%;
        }

        /* 新項目進入動畫 + 青色光暈 */
        @keyframes slideInDownWithGlow {
            0% {
                opacity: 0;
                transform: translateY(-20px);
                box-shadow: none;
            }
            50% {
                box-shadow: 0 0 20px rgba(6, 182, 212, 0.8), 0 0 30px rgba(6, 182, 212, 0.4);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
                box-shadow: none;
            }
        }
        .item-new-entry {
            animation: slideInDownWithGlow 0.6s ease-out;
        }

        /* 挑戰者實況：最多 5 列，超過時捲動 */
        #leaderboardList {
            max-height: 600px;
            overflow-y: auto;
            padding-right: 0.5rem; /* 為捲軸預留空間 */
        }

        /* 捲軸美化 */
        #leaderboardList::-webkit-scrollbar {

        /**
         * 驗證 Google Apps Script 響應格式
         * 防止無效或惡意響應導致 UI 崩潰
         *
         * @param {any} data - API 返回的數據
         * @returns {boolean} 驗證是否通過
         */
        function validateGASResponse(data) {
            // 檢查是否為陣列
            if (!Array.isArray(data)) {
                console.error("GAS response 不是陣列:", data);
                return false;
            }

            // 檢查元素結構
            for (let i = 0; i < data.length; i++) {
                const item = data[i];
                if (!item.name || item.count === undefined) {
                    console.error(`GAS response[${i}] 缺少必要欄位:`, item);
                    return false;
                }
                // 驗證計數為數字且非負
                if (typeof item.count !== 'number' || item.count < 0) {
                    console.error(`GAS response[${i}] count 無效:`, item.count);
                    return false;
                }
            }
            return true;
        }

        /**
         * 獲取排行榜數據，自動差異檢測
         * 避免無必要的重複渲染
         */
        async function fetchScores() {
            if (isLoadingScores) return; // 防止並發請求

            try {
                isLoadingScores = true;
                const res = await fetch(GAS_URL);

                if (!res.ok) {
                    showToast(`網路錯誤: ${res.status}`, 'error');
                    console.error(`❌ GAS API 失敗 (${res.status}):`, res);
                    return;
                }

                const data = await res.json();
                console.log('📊 GAS 返回數據:', data);

                // ✅ 驗證響應格式
                if (!validateGASResponse(data)) {
                    showToast('數據格式錯誤', 'error');
                    console.error('❌ 數據驗證失敗:', data);
                    return;
                }

                // 只在數據確實改變時渲染（避免閃爍）
                if (JSON.stringify(data) !== JSON.stringify(scores)) {
                    // 在數據更新前，計算排名變動並決定是否觸發獎牌卡
                    if (lastSubmitted) {
                        console.log(`🔍 [事件追蹤] lastSubmitted: ${lastSubmitted.name} (${lastSubmitted.count}隻)`);
                        const newRanked = [...data].sort((a, b) => b.count - a.count);

                        // 用名字找（不限 count，因為同名玩家可能有多筆，取最新那筆）
                        const newRankIdx = newRanked.findIndex(p =>
                            p.name === lastSubmitted.name && p.count === lastSubmitted.count
                        );
                        const newRank = newRankIdx + 1;
                        console.log(`🔍 [事件追蹤] newRankIdx=${newRankIdx}, newRank=${newRank}`);

                        const prevRankIdx = previousRanked.findIndex(p =>
                            p.name === lastSubmitted.name
                        );
                        const prevRank = prevRankIdx === -1 ? 999 : prevRankIdx + 1;
                        console.log(`🔍 [事件追蹤] prevRank=${prevRank}`);

                        if (newRank > 0) {
                            // ✅ 找到玩家才清空，避免競態條件（GAS 尚未寫入時不要清空）
                            lastSubmitted = null;

                            const isTop10Entry  = newRank <= 10 && prevRank > 10;
                            const isTop3Entry   = newRank <= 3  && prevRank > 3;
                            const hasRankUp     = prevRank !== 999 && newRank < prevRank;
                            const isRank1Entry  = newRank === 1  && prevRank !== 1;
                            console.log(`🔍 [事件追蹤] isTop10=${isTop10Entry} isTop3=${isTop3Entry} rankUp=${hasRankUp} rank1=${isRank1Entry}`);

                            if (isTop3Entry || isTop10Entry || hasRankUp || isRank1Entry) {
                                const playerData = newRanked[newRankIdx];
                                triggerMedalCard(playerData.name, playerData.count, newRank, playerData.title);
                            }

                            // 🎙️ 動態事件廣播（優先插隊）
                            const playerData = newRanked[newRankIdx];
                            const playerName = playerData.name;
                            const playerCount = playerData.count;

                            // 優先順序 1：登上第一名
                            if (isRank1Entry) {
                                eventMessage = `🎙️ 主播：${playerName} 登上王座！目前 ${playerCount} 隻！這是義方金魚王嗎？！`;
                            }

                            else if (isTop3Entry) {
                                eventMessage = `👥 觀眾：${playerName} 殺進前三名！！！`;
                            }
                            // 優先順序 3：超車（排名提升）
                            else if (hasRankUp) {
                                eventMessage = `🎙️ 主播：${playerName} 超車了！從第 ${prevRank} 名衝到第 ${newRank} 名！`;
                            }
                            // 優先順序 4：新人擠進前 10
                            else if (isTop10Entry) {
                                eventMessage = `🎙️ 主播：${playerName} 剛剛殺進前十！帶著 ${playerCount} 隻魚！`;
                            }

                            console.log(`🎙️ [事件追蹤] eventMessage="${eventMessage}"`);
                            // 有事件訊息時立刻插播
                            if (eventMessage) rotateMessage();
                        } else {
                            console.log(`⏳ [事件追蹤] 玩家尚未出現在數據，下輪再試`);
                        }
                        // newRank === 0 代表 GAS 尚未寫入，保留 lastSubmitted 等下一輪輪詢
                    }

                    scores = data;
                    console.log(`✅ 數據已更新 (${data.length} 筆)，開始渲染...`);

                    // 更新前次排名快照
                    previousRanked = [...data].sort((a, b) => b.count - a.count);

                    renderPodium();
                    renderList();
                } else {
                    console.log('ℹ️ 數據未變，跳過渲染');
                }
            } catch (err) {
                console.error("API 請求失敗:", err);
                showToast('無法連線，請檢查網路', 'error');
            } finally {
                isLoadingScores = false;
            }

        /**
         * 渲染領獎台排行榜
         *
         * 執行流程：
         * 1️⃣ 清空現有 DOM
         * 2️⃣ 遍歷 podiumOrder（10→1→9 順序）
         * 3️⃣ 查找對應排名的成績數據
         * 4️⃣ 計算長條比例（相對於最高分）
         * 5️⃣ 添加動畫延遲觸發填充效果
         *
         * @design 為什麼用 podiumOrder 排序？
         * - 實現視覺對稱：1 名居中，2,3 左右，4,5 更外側...
         * - 比直接排序更靈活，可自訂視覺層級
         */
        function renderPodium() {
            const container = document.getElementById('podium');
            container.innerHTML = "";

            // 1️⃣ 按分數排序找出排名（scores 按時間順序，需要重新排序）
            const ranked = [...scores].sort((a, b) => b.count - a.count);

            // 2️⃣ 找到最高分，用於計算條形相對高度
            const max = ranked.length > 0 ? ranked[0].count : 0;

            // 3️⃣ 用 podiumOrder 決定視覺位置（中間最高，左右遞減）
            podiumOrder.forEach(rank => {
                const data = ranked[rank - 1];

                // 只在有數據時才渲染該排名列
                if (!data) return;

                const column = document.createElement('div');
                column.className = `podium-column rank-column-${rank} ${rank === 1 ? 'rank-1-column z-10' : ''}`;

                // 計算填充高度：最低 20%，最高 100%，拉開視覺差距
                const fillHeight = (max === 0 || data.count === 0)
                    ? 5
                    : 20 + ((data.count / max) ** 0.6) * 80;

                const glowClass = rank <= 3 ? `glow-rank-${rank}` : '';
                column.innerHTML = `
                    <div class="text-center mb-3 w-full">
                        <span class="block ${getNameSize(rank)} font-bold text-slate-300 px-1 whitespace-normal break-words ${glowClass}">${escapeHtml(data.name)}</span>
                        <span class="oswald ${getScoreSize(rank)} font-bold neon-${rank}">${data.count}</span>
                    </div>
                    <div class="bar-wrapper">
                        <div id="bar-${rank}" class="bar-fill neon-${rank}" style="height: 0%"></div>
                    </div>
                    <span class="rank-label ${getRankSize(rank)} neon-${rank} ${glowClass}">${getEmoji(rank)} ${rank}</span>
                `;
                container.appendChild(column);

                // 延遲觸發動畫，避免頁面同時執行所有動畫
                setTimeout(() => {
                    const fill = document.getElementById(`bar-${rank}`);
                    if (fill) fill.style.height = `${fillHeight}%`;
                }, 100);
            });
        }

        /**
         * 防止 XSS 攻擊 — 轉義 HTML 特殊字符
         * @param {string} text - 要轉義的文本
         * @returns {string} 轉義後的文本
         */
        function escapeHtml(text) {
            // 防護：確保輸入是字符串
            if (text === null || text === undefined) return '';
            if (typeof text !== 'string') text = String(text);

            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, c => map[c]);
        }

         * 2️⃣ 禁用按鈕，顯示加載狀態
         * 3️⃣ 發送 POST 請求到 GAS
         * 4️⃣ 檢查是否觸發廣播（新紀錄）
         * 5️⃣ 重載排行榜或播放廣播
         */
        async function submitScore() {
            const name = document.getElementById('playerName').value || "無名大師";
            const btn = document.getElementById('btnSubmit');

            // 顯示加載狀態
            btn.disabled = true;
            btn.innerText = "傳送中...";

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "ADD_SCORE",
                        name: name,
                        count: currentInputCount
                    })
                });

                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }

                const responseText = await res.text();

                // 記錄提交的玩家資料，供動態事件廣播與動畫使用（任何分數都設）
                lastSubmitted = { name, count: currentInputCount };

                // 高分才觸發全螢幕廣播 overlay（threshold: 18 隻，對應水缸終結者）
                if (currentInputCount >= 18) {

                // 恢復按鈕狀態，重回班級選擇

                initializeClassSelection();

                // 等 GAS 寫入後立即拉取新數據（觸發動態事件廣播）
                setTimeout(fetchScores, 500);
            } catch (err) {
                console.error("提交失敗:", err);
                showToast('提交失敗，請檢查網路', 'error');
                btn.disabled = false;
                btn.innerText = "確認送出";
            }
        }

        function clearInput() {
            document.getElementById('playerName').value = '';
            currentInputCount = 0;
            document.getElementById('currentCount').innerText = "0";
        }

        /**
         * 觸發獎牌卡彈出
         * @param {string} name - 玩家名字
         * @param {number} count - 分數
         * @param {number} rank - 目前排名
         * @param {string} title - 稱號
         */
        function triggerMedalCard(name, count, rank, title) {
            const rankMsg = rank === 1 ? '🥇 登上第一名！' :
                            rank === 2 ? '🥈 榮登第二名！' :
                            rank === 3 ? '🥉 進入前三名！' :
                                         `🎉 擠進第 ${rank} 名！`;

            document.getElementById('mc-name').innerText = escapeHtml(name);
            document.getElementById('mc-count').innerText = count;
            document.getElementById('mc-title').innerText = calculateTitle(count);
            document.getElementById('mc-rank-badge').innerText = rankMsg;

            const card = document.getElementById('medalCard');
            const inner = document.getElementById('medalCardInner');

            // 重置動畫
            inner.classList.remove('medal-card-enter', 'medal-card-exit');
            card.classList.remove('hidden');

            // 觸發彈出動畫
            requestAnimationFrame(() => {
                inner.classList.add('medal-card-enter');
            });

            // 3 秒後淡出
            setTimeout(() => {
                inner.classList.remove('medal-card-enter');
                inner.classList.add('medal-card-exit');
                setTimeout(() => { card.classList.add('hidden'); }, 500);
            }, 3000);
        }

        /**
         * 重置排行榜（管理員專用）
         *
         * ⚠️ 危險操作 — 二次確認
         */
        async function resetLeaderboard() {
            // 二次確認
            if (!confirm("⚠️ 確定要清空所有紀錄嗎？此動作無法復原")) return;

            const btn = document.getElementById('btnReset');
            btn.disabled = true;
            btn.innerText = "處理中...";

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "RESET",
                        key: document.getElementById('adminPass').value
                    })
                });

                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }

                const responseText = await res.text();

                if (responseText === "RESET_SUCCESS") {
                    showToast('已重置所有紀錄', 'success');
                    setTimeout(() => location.reload(), 1500);
                } else {
                    showToast('重置失敗（密鑰無效）', 'error');
                    btn.disabled = false;
                    btn.innerText = "一鍵清空所有紀錄";
                }
            } catch (err) {
                console.error("重置失敗:", err);
                showToast('網路連線失敗', 'error');
                btn.disabled = false;
                btn.innerText = "一鍵清空所有紀錄";
            }
        }

        // ============ 廣播與動畫 ============

        /**
         * 觸發新紀錄廣播
         *
         * 根據成績等級決定頭銜和評語
         * @param {string} name - 玩家名稱
         * @param {number} count - 成績
         */
        function triggerBroadcast(name, count) {
            const overlay = document.getElementById('broadcastOverlay');
            document.getElementById('b-name').innerText = escapeHtml(name);
            document.getElementById('b-count').innerText = count;

            // 根據成績分級設定頭銜（與 GAS 後端同步）
            const title = calculateTitle(count);
            let heckle = "只是來借廁所的吧？";

            if (count >= 18) {
                heckle = "警報！水箱已爆裂，老闆準備轉行！";
            } else if (count >= 13) {
                heckle = "新王登基！全場尖叫聲！";
            } else if (count >= 8) {
                heckle = "這位常客，你的魚網是不是開外掛啊！";
            } else if (count >= 4) {
                heckle = "入門了！繼續衝啊！";
            }

            document.getElementById('b-title').innerText = title;
            document.getElementById('b-heckle').innerText = heckle;

            // 顯示廣播 6 秒後自動重載
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            setTimeout(() => { location.reload(); }, 6000);
        }

        /**
         * 背景動畫 — 游動的魚
         *
         * 參數說明：
         * - 大小：30~70px（隨機）
         * - 速度：15~35 秒（隨機，越快越激烈）
         * - 位置：0~85% 垂直高度（避免超出視界）
         * - 上下搖晃：4 秒週期（bobbing 效果）
         */
        const fishEmojis = ['🐟', '🐠', '🐡', '🐙', '🦑', '🦐', '🦀', '🦈', '🐋', '🐳', '🧜‍♂️', '🧜‍♀️'];
        const bgContainer = document.getElementById('fishBackground');

        /**
         * 建立單隻游動的魚
         * 設定隨機大小、速度、方向、高度
         */
        function createFish() {
            const fish = document.createElement('div');
            const emoji = fishEmojis[Math.floor(Math.random() * fishEmojis.length)];
            const direction = Math.random() > 0.5 ? 'right' : 'left';

            // 大小 30~70px
            const size = Math.floor(Math.random() * 40) + 30;

            // 速度 15~35 秒橫越螢幕
            const duration = Math.floor(Math.random() * 20) + 15;

            // 高度 0~85%
            const top = Math.floor(Math.random() * 85);

            fish.className = 'bg-fish';
            fish.innerText = emoji;
            fish.style.fontSize = `${size}px`;
            fish.style.top = `${top}%`;

            // 組合橫移動畫 + 上下搖晃
            fish.style.animation = `${direction === 'right' ? 'swimRight' : 'swimLeft'} ${duration}s linear forwards, bobbing 4s ease-in-out infinite`;

            bgContainer.appendChild(fish);

            // 動畫結束後移除 DOM（避免記憶體洩漏）
            setTimeout(() => { fish.remove(); }, duration * 1000);
        }

        // ============ 初始化 & 定期更新 ============

        /**
         * 廣播訊息輪換
         * 重置動畫以支援連續滾動
         */
        function rotateMessage() {
            const broadcastText = document.getElementById('broadcastText');
            // 重置動畫
            broadcastText.style.animation = 'none';
            // 觸發重排以應用動畫重置
            void broadcastText.offsetHeight;
            // 更新文字內容
            broadcastText.innerText = getNextMessage();
            // 恢復動畫
            broadcastText.style.animation = '';
        }

        // 初始化廣播訊息
        rotateMessage();
        // 每 5 秒換一句（marquee 動畫 5s，完全滑完後換新訊息）
        setInterval(rotateMessage, 5000);

        // 載入初始數據
        fetchScores();

        // 每 5 秒輪詢一次排行榜
        // 防止網路卡頓時過度請求（見 isLoadingScores 保護）
        setInterval(fetchScores, 5000);

        // 每 1.2 秒生成一隻魚（密度適中，不會過度渲染）
        setInterval(createFish, 1200);

        // 初始化時立即生成 10 隻魚（填滿背景）
        for (let i = 0; i < 10; i++) {
            setTimeout(createFish, Math.random() * 5000);
        }
    </script>
</body>
</html>
