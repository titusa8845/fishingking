<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>義方金魚王：及時排行系統 (Top 10 Pro)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-1: #fbbf24; --neon-2: #cbd5e1; --neon-3: #d97706;
            --neon-4: #38bdf8; --neon-5: #a855f7; --neon-6: #f43f5e;
            --neon-7: #10b981; --neon-8: #6366f1; --neon-9: #ec4899;
            --neon-10: #94a3b8;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #020617;
            color: #f1f5f9;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .oswald { font-family: 'Oswald', sans-serif; }
        
        @keyframes fillUp { from { height: 0; opacity: 0; } to { opacity: 1; } }
        
        /* 領獎台容器：支援 10 根光棒 */
        .podium-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 6px;
            height: 480px;
            margin-bottom: 60px;
            padding: 0 10px;
        }

        .podium-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 9%; /* 10 根約佔 90% */
            min-width: 60px;
            transition: all 0.5s ease;
        }

        .bar-wrapper {
            width: 100%;
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .bar-fill {
            width: 100%;
            height: 0;
            background: linear-gradient(to top, transparent, currentColor);
            box-shadow: 0 0 15px currentColor;
            animation: fillUp 1.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            position: absolute;
            bottom: 0;
        }

        .bar-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            animation: lightMove 2.5s infinite linear;
        }

        @keyframes lightMove { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

        .rank-label {
            font-family: 'Oswald', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            opacity: 0.15;
            margin-top: 8px;
        }

        /* 霓虹配色組 */
        .neon-1 { color: var(--neon-1); } .neon-2 { color: var(--neon-2); }
        .neon-3 { color: var(--neon-3); } .neon-4 { color: var(--neon-4); }
        .neon-5 { color: var(--neon-5); } .neon-6 { color: var(--neon-6); }
        .neon-7 { color: var(--neon-7); } .neon-8 { color: var(--neon-8); }
        .neon-9 { color: var(--neon-9); } .neon-10 { color: var(--neon-10); }

        /* 特殊高光 */
        .rank-1-glow { filter: drop-shadow(0 0 20px var(--neon-1)); }
    </style>
</head>
<body class="p-2 md:p-6">

    <div class="max-w-[1400px] mx-auto">
        
        <header class="text-center mb-12">
            <h1 class="text-6xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-b from-yellow-100 to-yellow-600 mb-2 italic">TOP 10 FISH KING</h1>
            <p class="text-cyan-400 font-bold tracking-[0.5em] text-xs uppercase">義方金魚王：終極排行戰報</p>
        </header>

        <!-- 🏆 十人領獎台 (10-8-6-4-2-1-3-5-7-9 佈局) -->
        <section id="podium" class="podium-container">
            <!-- JS 將依照 10, 8, 6, 4, 2, 1, 3, 5, 7, 9 的順序生成 HTML -->
        </section>

        <!-- 📜 第 11 名以後列表 -->
        <section class="bg-slate-900/40 border border-slate-800 rounded-3xl p-6 md:p-8 backdrop-blur-md mb-20">
            <h3 class="text-lg font-black mb-6 flex items-center gap-3">
                <span class="w-1 h-5 bg-cyan-500"></span> 其餘挑戰者 (11+)
            </h3>
            <ul id="leaderboardList" class="grid grid-cols-1 md:grid-cols-3 gap-3 text-sm">
                <!-- 由 JS 動態生成 -->
            </ul>
        </section>

        <footer class="flex justify-center gap-6 pb-20">
            <button onclick="toggleView('input')" class="bg-cyan-600 hover:bg-cyan-500 text-white font-black px-12 py-4 rounded-xl text-xl shadow-lg transition-all active:scale-95">回報戰績 🎣</button>
        </footer>
    </div>

    <!-- [報分彈窗] 保持不變 -->
    <div id="inputModal" class="fixed inset-0 bg-black/95 hidden flex flex-col items-center justify-center p-6 z-[99999] backdrop-blur-2xl">
        <div class="w-full max-w-md text-center">
            <h2 class="text-4xl font-black mb-10 text-yellow-400">回報戰績</h2>
            <input type="text" id="playerName" placeholder="你的暱稱" class="bg-slate-800 border-2 border-slate-700 p-6 rounded-2xl w-full text-center text-2xl mb-8 outline-none focus:border-cyan-500">
            <div class="flex items-center justify-center gap-8 mb-10">
                <button onclick="changeCount(-1)" class="w-16 h-16 bg-slate-800 rounded-full text-3xl font-bold">-</button>
                <span id="currentCount" class="oswald text-7xl font-black min-w-[120px] text-cyan-400">0</span>
                <button onclick="changeCount(1)" class="w-16 h-16 bg-slate-800 rounded-full text-3xl font-bold">+</button>
            </div>
            <div class="flex gap-4 mb-8">
                <button onclick="changeCount(10)" class="bg-slate-800 flex-1 py-3 rounded-lg font-bold text-lg">+10</button>
                <button onclick="changeCount(50)" class="bg-slate-800 flex-1 py-3 rounded-lg font-bold text-lg">+50</button>
            </div>
            <div class="flex flex-col gap-4">
                <button onclick="submitScore()" id="btnSubmit" class="bg-yellow-500 text-slate-950 font-black py-5 rounded-xl text-xl">確認送出</button>
                <button onclick="toggleView('main')" class="text-slate-500 font-bold py-3">返回主頁</button>
            </div>
        </div>
    </div>

    <!-- [插播遮罩] 保持不變 -->
    <div id="broadcastOverlay" class="fixed inset-0 bg-black/98 hidden flex-col items-center justify-center p-6 text-center z-[100000]">
        <div class="animate-pulse mb-8 text-5xl font-black text-yellow-400 tracking-[0.8em]">NEW RECORD</div>
        <div class="bg-white/5 p-12 rounded-[40px] border border-white/10 shadow-2xl relative">
            <h2 id="b-name" class="text-7xl font-black mb-4 italic">---</h2>
            <div class="oswald text-9xl font-black text-yellow-400 leading-none mb-6"><span id="b-count">0</span><span class="text-2xl ml-2">FISH</span></div>
            <h3 id="b-title" class="text-4xl font-black text-slate-900 bg-yellow-400 px-10 py-5 rounded-xl inline-block">👑 稱號出現</h3>
        </div>
        <div class="mt-16"><p id="b-heckle" class="text-3xl text-cyan-400 font-black italic typewriter">---</p></div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwzmoyqSBEL-C4SnzHsx9x03EWEn_gKR6XE4zOtPLt-5pYTjeVgrdczlPWlSqpY9XTF/exec";
        let scores = [];
        let currentInputCount = 0;

        // 領獎台渲染順序 (對稱式)
        const podiumOrder = [10, 8, 6, 4, 2, 1, 3, 5, 7, 9];

        async function fetchScores() {
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                if (JSON.stringify(data) !== JSON.stringify(scores)) {
                    scores = data;
                    renderPodium();
                    renderList();
                }
            } catch (err) { console.error("API Error", err); }
        }

        function renderPodium() {
            const container = document.getElementById('podium');
            container.innerHTML = "";
            const max = scores[0] ? scores[0].count : 1;

            podiumOrder.forEach(rank => {
                const data = scores[rank - 1] || { name: "---", count: 0 };
                const column = document.createElement('div');
                column.className = `podium-column ${rank === 1 ? 'scale-110 z-10' : ''}`;
                
                // 基礎高度設定 (1 號最高，其餘依名次遞減)
                const baseHeights = { 1: 320, 2: 260, 3: 220, 4: 180, 5: 150, 6: 120, 7: 100, 8: 80, 9: 60, 10: 40 };
                const h = (data.count === 0) ? 0 : (data.count / max) * baseHeights[rank];

                column.innerHTML = `
                    <div class="text-center mb-1 w-full">
                        <span class="block text-[10px] font-bold text-slate-400 truncate px-1">${data.name}</span>
                        <span class="oswald text-lg font-bold neon-${rank}">${data.count}</span>
                    </div>
                    <div class="bar-wrapper" style="height: ${baseHeights[rank]}px">
                        <div id="bar-${rank}" class="bar-fill neon-${rank}" style="height: 0%"></div>
                    </div>
                    <span class="rank-label neon-${rank}">${rank}</span>
                `;
                container.appendChild(column);

                // 動態高度觸發
                setTimeout(() => {
                    const fill = document.getElementById(`bar-${rank}`);
                    if (fill) fill.style.height = (data.count === 0 ? '0' : '100%');
                }, 100);
            });
        }

        function renderList() {
            const listEl = document.getElementById('leaderboardList');
            listEl.innerHTML = "";
            const others = scores.slice(10); // 第 11 名以後

            if (others.length === 0) {
                listEl.innerHTML = `<li class="col-span-full py-6 text-center text-slate-700 italic">目前無更多挑戰者...</li>`;
                return;
            }

            others.forEach((p, idx) => {
                const li = document.createElement('li');
                li.className = "flex items-center justify-between bg-slate-800/20 p-4 rounded-xl border border-white/5";
                li.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="oswald text-slate-600 text-lg">#${idx + 11}</span>
                        <div class="font-bold truncate max-w-[100px]">${p.name}</div>
                    </div>
                    <div class="oswald text-xl font-bold text-slate-400">${p.count}</div>
                `;
                listEl.appendChild(li);
            });
        }

        function toggleView(view) {
            document.getElementById('inputModal').classList.add('hidden');
            if (view === 'input') document.getElementById('inputModal').classList.remove('hidden');
        }

        function changeCount(val) {
            currentInputCount = Math.max(0, currentInputCount + val);
            document.getElementById('currentCount').innerText = currentInputCount;
        }

        async function submitScore() {
            const name = document.getElementById('playerName').value || "無名大師";
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerText = "傳送中...";
            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "ADD_SCORE", name: name, count: currentInputCount })
                });
                if (currentInputCount >= 50 || (scores[0] && currentInputCount > scores[0].count)) {
                    triggerBroadcast(name, currentInputCount);
                } else {
                    alert("報分成功！");
                    location.reload();
                }
            } catch (err) {
                alert("網路異常");
                btn.disabled = false;
                btn.innerText = "確認送出";
            }
        }

        function triggerBroadcast(name, count) {
            const overlay = document.getElementById('broadcastOverlay');
            document.getElementById('b-name').innerText = name;
            document.getElementById('b-count').innerText = count;
            let title = "🌊 觀浪者"; let heckle = "只是來借廁所的吧？";
            if (count >= 100) { title = "👾 水缸終結者"; heckle = "警報！水箱已爆裂，老闆準備轉行！"; }
            else if (count >= 51) { title = "👑 義方金魚王"; heckle = "新王登基！全場尖叫聲！"; }
            document.getElementById('b-title').innerText = title;
            document.getElementById('b-heckle').innerText = heckle;
            overlay.classList.remove('hidden'); overlay.classList.add('flex');
            setTimeout(() => { location.reload(); }, 6000);
        }

        fetchScores();
        setInterval(fetchScores, 15000);
    </script>
</body>
</html>
