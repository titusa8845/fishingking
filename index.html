<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>義方金魚王：海洋世界排行版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-1: #fbbf24; --neon-2: #cbd5e1; --neon-3: #d97706;
            --neon-4: #38bdf8; --neon-5: #a855f7; --neon-6: #f43f5e;
            --neon-7: #10b981; --neon-8: #6366f1; --neon-9: #ec4899;
            --neon-10: #94a3b8;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(to bottom, #020617 0%, #0c4a6e 100%);
            color: #f1f5f9;
            min-height: 100vh;
            overflow-x: hidden;
            margin: 0;
        }
        .oswald { font-family: 'Oswald', sans-serif; }
        
        @keyframes fillUp { from { height: 0; opacity: 0; } to { opacity: 1; } }

        /* --- 領獎台容器 --- */
        .podium-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 10px;
            height: 450px;
            margin-bottom: 20px;
            padding: 0 10px;
            position: relative;
            z-index: 10;
        }

        .podium-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            width: 9%;
            min-width: 60px;
            height: 100%;
        }

        /* 只有長條圖本身，取消搖擺 */
        .bar-wrapper {
            width: 100%;
            height: 320px;
            position: relative;
            background: transparent;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            overflow: hidden;
            /* 移除邊框：讓長條圖更突出 */
            /* 移除 animation: seaweedSway */
        }

        /* 移除原有的晃動錯開設定 */
        .rank-column-2 .bar-wrapper, 
        .rank-column-3 .bar-wrapper, 
        .rank-column-4 .bar-wrapper, 
        .rank-column-1 .bar-wrapper { 
            animation: none; 
        }

        .bar-fill {
            width: 100%;
            height: 0;
            background: linear-gradient(to top, rgba(255,255,255,0.15), currentColor);
            box-shadow: 0 0 25px currentColor;
            animation: fillUp 2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            position: absolute; bottom: 0;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }

        /* 氣泡能量上升特效 */
        .bar-fill::after {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.5) 15%, transparent 15%);
            background-size: 25px 40px;
            animation: bubbleRise 3s infinite linear;
            opacity: 0.4;
        }

        @keyframes bubbleRise {
            0% { background-position: 0 100%; }
            100% { background-position: 0 0%; }
        }

        /* --- Tailwind 替代 CSS --- */
        * { box-sizing: border-box; }
        html, body { padding: 0; }

        .max-w-\[1400px\] { max-width: 1400px; }
        .mx-auto { margin-left: auto; margin-right: auto; }
        .p-4 { padding: 1rem; }
        .p-6 { padding: 1.5rem; }
        .p-8 { padding: 2rem; }
        .px-8 { padding-left: 2rem; padding-right: 2rem; }
        .px-20 { padding-left: 5rem; padding-right: 5rem; }
        .py-6 { padding-top: 1.5rem; padding-bottom: 1.5rem; }
        .py-8 { padding-top: 2rem; padding-bottom: 2rem; }
        .py-10 { padding-top: 2.5rem; padding-bottom: 2.5rem; }
        .py-16 { padding-top: 4rem; padding-bottom: 4rem; }
        .py-4 { padding-top: 1rem; padding-bottom: 1rem; }
        .py-5 { padding-top: 1.25rem; padding-bottom: 1.25rem; }
        .pl-1 { padding-left: 0.25rem; }
        .pr-1 { padding-right: 0.25rem; }

        .text-center { text-align: center; }
        .text-white { color: white; }
        .text-slate-300 { color: #cbd5e1; }
        .text-slate-400 { color: #94a3b8; }
        .text-slate-500 { color: #64748b; }
        .text-slate-900 { color: #0f172a; }
        .text-cyan-300 { color: #06b6d4; }
        .text-cyan-400 { color: #06d6e9; }
        .text-yellow-100 { color: #fef3c7; }
        .text-yellow-400 { color: #facc15; }
        .text-red-400 { color: #f87171; }
        .text-slate-950 { color: #020617; }

        .bg-cyan-400 { background-color: #06d6e9; }
        .bg-cyan-500 { background-color: #0284c7; }
        .bg-cyan-600 { background-color: #0369a1; }
        .bg-slate-700 { background-color: #334155; }
        .bg-slate-800 { background-color: #1e293b; }
        .bg-slate-950 { background-color: #020617; }
        .bg-yellow-400 { background-color: #facc15; }
        .bg-yellow-500 { background-color: #eab308; }
        .bg-red-600 { background-color: #dc2626; }
        .bg-red-950 { background-color: #7c2d12; }
        .bg-white { background-color: white; }

        .border { border: 1px solid currentColor; }
        .border-2 { border-width: 2px; }
        .border-4 { border-width: 4px; }
        .border-cyan-400 { border-color: #06d6e9; }
        .border-slate-700 { border-color: #334155; }
        .border-white { border-color: white; }
        .border-red-500 { border-color: #ef4444; }

        .rounded-2xl { border-radius: 1rem; }
        .rounded-3xl { border-radius: 1.5rem; }
        .rounded-\[30px\] { border-radius: 30px; }
        .rounded-\[40px\] { border-radius: 40px; }
        .rounded-\[50px\] { border-radius: 50px; }
        .rounded-\[80px\] { border-radius: 80px; }
        .rounded-full { border-radius: 9999px; }

        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .gap-4 { gap: 1rem; }
        .gap-6 { gap: 1.5rem; }
        .gap-10 { gap: 2.5rem; }
        .gap-12 { gap: 3rem; }

        .grid { display: grid; }
        .grid-cols-1 { grid-template-columns: repeat(1, minmax(0, 1fr)); }
        .grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .col-span-full { grid-column: 1 / -1; }

        .w-full { width: 100%; }
        .w-24 { width: 6rem; }
        .w-2 { width: 0.5rem; }
        .min-w-\[200px\] { min-width: 200px; }
        .h-8 { height: 2rem; }
        .h-24 { height: 6rem; }
        .h-\[15rem\] { height: 15rem; }

        .font-bold { font-weight: 700; }
        .font-black { font-weight: 900; }
        .text-2xl { font-size: 1.5rem; line-height: 2rem; }
        .text-3xl { font-size: 1.875rem; line-height: 2.25rem; }
        .text-4xl { font-size: 2.25rem; line-height: 2.5rem; }
        .text-5xl { font-size: 3rem; line-height: 1; }
        .text-6xl { font-size: 3.75rem; line-height: 1; }
        .text-7xl { font-size: 4.5rem; line-height: 1; }
        .text-8xl { font-size: 6rem; line-height: 1; }
        .text-9xl { font-size: 8rem; line-height: 1; }
        .text-\[12px\] { font-size: 12px; }
        .text-\[15rem\] { font-size: 15rem; }

        .mb-2 { margin-bottom: 0.5rem; }
        .mb-3 { margin-bottom: 0.75rem; }
        .mb-6 { margin-bottom: 1.5rem; }
        .mb-8 { margin-bottom: 2rem; }
        .mb-10 { margin-bottom: 2.5rem; }
        .mb-12 { margin-bottom: 3rem; }
        .mb-20 { margin-bottom: 5rem; }
        .mb-24 { margin-bottom: 6rem; }
        .mt-8 { margin-top: 2rem; }
        .mt-10 { margin-top: 2.5rem; }
        .mt-24 { margin-top: 6rem; }
        .ml-6 { margin-left: 1.5rem; }
        .mx-auto { margin-left: auto; margin-right: auto; }

        .hidden { display: none; }
        .block { display: block; }
        .inline-block { display: inline-block; }
        .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .uppercase { text-transform: uppercase; }
        .italic { font-style: italic; }
        .tracking-tighter { letter-spacing: -0.05em; }
        .tracking-\[0.4em\] { letter-spacing: 0.4em; }
        .tracking-\[0.5em\] { letter-spacing: 0.5em; }
        .leading-none { line-height: 1; }

        .bg-clip-text { background-clip: text; -webkit-background-clip: text; }
        .text-transparent { color: transparent; }
        .bg-gradient-to-b { background-image: linear-gradient(to bottom, var(--tw-gradient-stops)); }
        .from-yellow-100 { --tw-gradient-stops: #fef3c7, var(--tw-gradient-to, transparent); }
        .to-yellow-500 { --tw-gradient-to: #eab308; }

        .drop-shadow-2xl { filter: drop-shadow(0 25px 25px rgba(0, 0, 0, 0.25)); }
        .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .shadow-2xl { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }

        .inset-0 { inset: 0; }
        .fixed { position: fixed; }
        .absolute { position: absolute; }
        .relative { position: relative; }
        .top-0 { top: 0; }
        .bottom-0 { bottom: 0; }
        .left-0 { left: 0; }
        .right-0 { right: 0; }
        .bottom-32 { bottom: 8rem; }
        .pb-32 { padding-bottom: 8rem; }

        .z-\[1000\] { z-index: 1000; }
        .z-\[2000\] { z-index: 2000; }
        .z-10 { z-index: 10; }
        .z-\[-2\] { z-index: -2; }
        .z-\[-1\] { z-index: -1; }

        .backdrop-blur-xl { backdrop-filter: blur(20px); }
        .backdrop-blur-2xl { backdrop-filter: blur(40px); }
        .backdrop-blur-3xl { backdrop-filter: blur(64px); }

        .outline-none { outline: 2px solid transparent; outline-offset: 2px; }
        .transition-all { transition-property: all; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }
        .active\:scale-95:active { transform: scale(0.95); }

        .hover\:bg-cyan-400:hover { background-color: #06d6e9; }
        .hover\:bg-red-500:hover { background-color: #ef4444; }
        .hover\:bg-white\/10:hover { background-color: rgba(255, 255, 255, 0.1); }

        .focus\:border-cyan-400:focus { border-color: #06d6e9; }

        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .space-y-12 > * + * { margin-top: 3rem; }

        .pb-32 { padding-bottom: 8rem; }

        /* Toast 通知 */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: rgba(0, 0, 0, 0.95);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            z-index: 9999;
            animation: slideIn 0.3s ease-out;
            max-width: 400px;
            word-wrap: break-word;
        }

        .toast.success { border-left: 4px solid #10b981; }
        .toast.error { border-left: 4px solid #ef4444; }
        .toast.info { border-left: 4px solid #0284c7; }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* 固定名次標籤 */
        .rank-label {
            font-family: 'Oswald', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            opacity: 0.2;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .neon-1 { color: var(--neon-1); } .neon-2 { color: var(--neon-2); }
        .neon-3 { color: var(--neon-3); } .neon-4 { color: var(--neon-4); }
        .neon-5 { color: var(--neon-5); } .neon-6 { color: var(--neon-6); }
        .neon-7 { color: var(--neon-7); } .neon-8 { color: var(--neon-8); }
        .neon-9 { color: var(--neon-9); } .neon-10 { color: var(--neon-10); }

        .rank-1-column .bar-fill { filter: brightness(1.3); box-shadow: 0 0 45px var(--neon-1); }

        /* --- 動態海洋與海浪 --- */
        #fishBackground { position: fixed; inset: 0; z-index: -2; overflow: hidden; pointer-events: none; }
        .bg-fish { position: absolute; white-space: nowrap; user-select: none; opacity: 0.5; will-change: transform; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); }
        @keyframes swimLeft { from { transform: translateX(110vw) scaleX(-1); } to { transform: translateX(-20vw) scaleX(-1); } }
        @keyframes swimRight { from { transform: translateX(-20vw); } to { transform: translateX(110vw); } }
        @keyframes bobbing { 0%, 100% { margin-top: 0; } 50% { margin-top: -15px; } }

        /* --- 經典 SVG 海浪 --- */
        .wave-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 120px; z-index: -1; pointer-events: none; }
        .waves { position: relative; width: 100%; height: 100%; }
        .parallax > use { animation: move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite; }
        .parallax > use:nth-child(1) { animation-delay: -2s; animation-duration: 7s; }
        .parallax > use:nth-child(2) { animation-delay: -3s; animation-duration: 10s; }
        .parallax > use:nth-child(3) { animation-delay: -4s; animation-duration: 13s; }
        .parallax > use:nth-child(4) { animation-delay: -5s; animation-duration: 20s; }
        @keyframes move-forever { 0% { transform: translate3d(-90px,0,0); } 100% { transform: translate3d(85px,0,0); } }

        /* 新項目進入動畫 + 青色光暈 */
        @keyframes slideInDownWithGlow {
            0% {
                opacity: 0;
                transform: translateY(-20px);
                box-shadow: none;
            }
            50% {
                box-shadow: 0 0 20px rgba(6, 182, 212, 0.8), 0 0 30px rgba(6, 182, 212, 0.4);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
                box-shadow: none;
            }
        }
        .item-new-entry {
            animation: slideInDownWithGlow 0.6s ease-out;
        }

        /* 挑戰者實況：最多 5 列，超過時捲動 */
        #leaderboardList {
            max-height: 600px;
            overflow-y: auto;
            padding-right: 0.5rem; /* 為捲軸預留空間 */
        }

        /* 捲軸美化 */
        #leaderboardList::-webkit-scrollbar {
            width: 8px;
        }
        #leaderboardList::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        #leaderboardList::-webkit-scrollbar-thumb {
            background: rgba(6, 182, 212, 0.6);
            border-radius: 10px;
        }
        #leaderboardList::-webkit-scrollbar-thumb:hover {
            background: rgba(6, 182, 212, 0.9);
        }
    </style>
</head>
<body>
    <div id="fishBackground"></div>
    <div class="wave-container">
        <svg class="waves" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
        viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
            <defs><path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" /></defs>
            <g class="parallax">
                <use xlink:href="#gentle-wave" x="48" y="0" fill="rgba(14, 165, 233, 0.3)" />
                <use xlink:href="#gentle-wave" x="48" y="3" fill="rgba(14, 165, 233, 0.5)" />
                <use xlink:href="#gentle-wave" x="48" y="5" fill="rgba(14, 165, 233, 0.7)" />
                <use xlink:href="#gentle-wave" x="48" y="7" fill="#0ea5e9" />
            </g>
        </svg>
    </div>

    <div class="max-w-[1400px] mx-auto p-4">
        <header class="text-center mt-8 mb-10">
            <h1 class="text-7xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-b from-yellow-100 to-yellow-500 mb-2 italic tracking-tighter drop-shadow-2xl text-white">義方金魚王</h1>
            <p class="text-cyan-300 font-bold tracking-[0.4em] text-3xl uppercase">及時戰況看板</p>
        </header>

        <section id="podium" class="podium-container"></section>

        <section class="bg-slate-950/40 border border-white/10 rounded-[40px] p-8 md:p-10 backdrop-blur-xl mb-20 shadow-2xl">
            <h3 class="text-2xl font-black mb-8 flex items-center gap-4">
                <span class="w-2 h-8 bg-cyan-400 rounded-full animate-pulse"></span> 挑戰者實況
            </h3>
            <ul id="leaderboardList" class="grid grid-cols-1 md:grid-cols-3 gap-6"></ul>
        </section>

        <footer class="flex justify-center gap-10 pb-32">
            <button onclick="toggleView('input')" class="bg-cyan-500 hover:bg-cyan-400 text-white font-black px-20 py-6 rounded-3xl text-3xl shadow-lg transition-all active:scale-95">回報戰績 🎣</button>
            <button onclick="toggleView('admin')" class="bg-slate-800/50 text-slate-400 px-8 py-6 rounded-3xl text-xl font-bold">⚙️</button>
        </footer>
    </div>

    <!-- 彈窗內容 (保持完整) -->
    <div id="inputModal" class="fixed inset-0 bg-black/90 hidden flex flex-col items-center justify-center p-6 z-[1000] backdrop-blur-2xl">
        <div class="w-full max-w-lg text-center">
            <h2 class="text-5xl font-black mb-12 text-yellow-400">回報戰績</h2>
            <input type="text" id="playerName" placeholder="你的暱稱" class="bg-slate-800 border-4 border-slate-700 p-8 rounded-3xl w-full text-center text-4xl mb-12 outline-none focus:border-cyan-400 text-white font-bold">
            <div class="flex items-center justify-center gap-12 mb-12">
                <button onclick="changeCount(-1)" class="w-24 h-24 bg-slate-700 rounded-full text-6xl font-bold">-</button>
                <span id="currentCount" class="oswald text-9xl font-black min-w-[200px] text-cyan-400">0</span>
                <button onclick="changeCount(1)" class="w-24 h-24 bg-slate-700 rounded-full text-6xl font-bold">+</button>
            </div>
            <div class="flex flex-col gap-6">
                <button onclick="submitScore()" id="btnSubmit" class="bg-yellow-500 text-slate-950 font-black py-8 rounded-[30px] text-4xl shadow-2xl active:scale-95">確認送出</button>
                <button onclick="toggleView('main')" class="text-slate-400 font-bold text-2xl py-4">返回主頁</button>
            </div>
        </div>
    </div>

    <div id="adminModal" class="fixed inset-0 bg-black/95 hidden flex flex-col items-center justify-center p-6 z-[1000] backdrop-blur-3xl">
        <div class="w-full max-w-xl text-center">
            <h2 class="text-4xl font-black mb-12 text-center">⚙️ 管理系統</h2>
            <div id="adminAuth">
                <input type="password" id="adminPass" placeholder="輸入密碼" class="bg-slate-800 border-2 border-slate-700 p-6 rounded-2xl w-full text-center text-3xl mb-10 outline-none text-white">
                <button onclick="verifyAdmin()" class="bg-cyan-600 px-16 py-5 rounded-2xl font-bold text-2xl">進入面板</button>
                <button onclick="toggleView('main')" class="block mx-auto mt-10 text-slate-500 text-xl">取消</button>
            </div>
            <div id="adminPanel" class="hidden space-y-12">
                <div class="bg-red-950/30 border border-red-500/30 p-12 rounded-[50px]">
                    <h3 class="text-3xl font-bold text-red-400 mb-6">☢️ 危險區</h3>
                    <button onclick="resetLeaderboard()" id="btnReset" class="bg-red-600 hover:bg-red-500 text-white font-black px-16 py-6 rounded-[30px] text-2xl shadow-2xl">一鍵清空所有紀錄</button>
                </div>
                <button onclick="toggleView('main')" class="w-full py-6 bg-slate-800 rounded-3xl font-bold text-slate-300 text-2xl">返回</button>
            </div>
        </div>
    </div>

    <div id="broadcastOverlay" class="fixed inset-0 bg-black/98 hidden flex-col items-center justify-center p-6 text-center z-[2000]">
        <div class="animate-pulse mb-12 text-7xl font-black text-yellow-400 tracking-[0.5em]">NEW RECORD</div>
        <div class="bg-white/5 p-24 rounded-[80px] border border-white/10 shadow-2xl backdrop-blur-3xl">
            <h2 id="b-name" class="text-9xl font-black mb-8 italic text-white">---</h2>
            <div class="oswald text-[15rem] font-black text-yellow-400 leading-none mb-10"><span id="b-count">0</span><span class="text-4xl ml-6">FISH</span></div>
            <h3 id="b-title" class="text-6xl font-black text-slate-900 bg-yellow-400 px-20 py-10 rounded-[40px] inline-block shadow-2xl">👑 義方金魚王</h3>
        </div>
        <div class="mt-24"><p id="b-heckle" class="text-5xl text-cyan-300 font-black italic">---</p></div>
    </div>

    <script>
        /**
         * 義方金魚王排行榜應用
         *
         * 執行流程：
         * 1️⃣ 初始化：讀取 GAS API 數據
         * 2️⃣ 定期輪詢：每 5 秒檢查更新
         * 3️⃣ 渲染排行榜：領獎台 + 列表
         * 4️⃣ 用戶互動：提交成績、管理員面板
         */

        // ============ 配置常數 ============
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwzmoyqSBEL-C4SnzHsx9x03EWEn_gKR6XE4zOtPLt-5pYTjeVgrdczlPWlSqpY9XTF/exec";

        /**
         * 根據排名返回字體大小（漸進式金字塔）
         */
        const getNameSize = (rank) => {
            if (rank === 1) return 'text-3xl';      // 🥇 最大
            if (rank <= 3) return 'text-2xl';       // 🥈🥉 次大
            if (rank <= 6) return 'text-lg';        // 4-6: 中等
            return 'text-base';                     // 7-10: 最小
        };

        const getScoreSize = (rank) => {
            if (rank === 1) return 'text-6xl';
            if (rank <= 3) return 'text-5xl';
            if (rank <= 6) return 'text-4xl';
            return 'text-3xl';
        };

        const getRankSize = (rank) => {
            if (rank === 1) return 'text-5xl';
            if (rank <= 3) return 'text-4xl';
            if (rank <= 6) return 'text-3xl';
            return 'text-2xl';
        };

        /**
         * 領獎台排序邏輯
         * 實現 1, 2, 3 名在中間，周圍對稱遞減的視覺效果
         * 左: 10, 8, 6, 4, 2 | 中: 1 | 右: 3, 5, 7, 9
         */
        const podiumOrder = [10, 8, 6, 4, 2, 1, 3, 5, 7, 9];
        const ADMIN_PASSWORD = "1234"; // ⚠️ 應改為後端驗證

        // ============ 應用狀態 ============
        let scores = [];
        let currentInputCount = 0;
        let isLoadingScores = false;
        let lastSubmitted = null; // 記錄最近提交的玩家 { name, count }，用於動畫識別

        /**
         * 驗證 Google Apps Script 響應格式
         * 防止無效或惡意響應導致 UI 崩潰
         *
         * @param {any} data - API 返回的數據
         * @returns {boolean} 驗證是否通過
         */
        function validateGASResponse(data) {
            // 檢查是否為陣列
            if (!Array.isArray(data)) {
                console.error("GAS response 不是陣列:", data);
                return false;
            }

            // 檢查元素結構
            for (let i = 0; i < data.length; i++) {
                const item = data[i];
                if (!item.name || item.count === undefined) {
                    console.error(`GAS response[${i}] 缺少必要欄位:`, item);
                    return false;
                }
                // 驗證計數為數字且非負
                if (typeof item.count !== 'number' || item.count < 0) {
                    console.error(`GAS response[${i}] count 無效:`, item.count);
                    return false;
                }
            }
            return true;
        }

        /**
         * 獲取排行榜數據，自動差異檢測
         * 避免無必要的重複渲染
         */
        async function fetchScores() {
            if (isLoadingScores) return; // 防止並發請求

            try {
                isLoadingScores = true;
                const res = await fetch(GAS_URL);

                if (!res.ok) {
                    showToast(`網路錯誤: ${res.status}`, 'error');
                    console.error(`❌ GAS API 失敗 (${res.status}):`, res);
                    return;
                }

                const data = await res.json();
                console.log('📊 GAS 返回數據:', data);

                // ✅ 驗證響應格式
                if (!validateGASResponse(data)) {
                    showToast('數據格式錯誤', 'error');
                    console.error('❌ 數據驗證失敗:', data);
                    return;
                }

                // 只在數據確實改變時渲染（避免閃爍）
                if (JSON.stringify(data) !== JSON.stringify(scores)) {
                    scores = data;
                    console.log(`✅ 數據已更新 (${data.length} 筆)，開始渲染...`);
                    renderPodium();
                    renderList();
                } else {
                    console.log('ℹ️ 數據未變，跳過渲染');
                }
            } catch (err) {
                console.error("API 請求失敗:", err);
                showToast('無法連線，請檢查網路', 'error');
            } finally {
                isLoadingScores = false;
            }
        }

        /**
         * 渲染領獎台排行榜
         *
         * 執行流程：
         * 1️⃣ 清空現有 DOM
         * 2️⃣ 遍歷 podiumOrder（10→1→9 順序）
         * 3️⃣ 查找對應排名的成績數據
         * 4️⃣ 計算長條比例（相對於最高分）
         * 5️⃣ 添加動畫延遲觸發填充效果
         *
         * @design 為什麼用 podiumOrder 排序？
         * - 實現視覺對稱：1 名居中，2,3 左右，4,5 更外側...
         * - 比直接排序更靈活，可自訂視覺層級
         */
        function renderPodium() {
            const container = document.getElementById('podium');
            container.innerHTML = "";

            // 1️⃣ 按分數排序找出排名（scores 按時間順序，需要重新排序）
            const ranked = [...scores].sort((a, b) => b.count - a.count);

            // 2️⃣ 找到最高分，用於計算條形相對高度
            const max = ranked.length > 0 ? ranked[0].count : 0;

            // 3️⃣ 用 podiumOrder 決定視覺位置（中間最高，左右遞減）
            podiumOrder.forEach(rank => {
                const data = ranked[rank - 1];

                // 只在有數據時才渲染該排名列
                if (!data) return;

                const column = document.createElement('div');
                column.className = `podium-column rank-column-${rank} ${rank === 1 ? 'rank-1-column scale-110 z-10' : ''}`;

                // 計算填充高度百分比
                const fillHeight = (max === 0 || data.count === 0) ? 0 : (data.count / max) * 100;

                column.innerHTML = `
                    <div class="text-center mb-3 w-full">
                        <span class="block ${getNameSize(rank)} font-bold text-slate-300 truncate px-1">${escapeHtml(data.name)}</span>
                        <span class="oswald ${getScoreSize(rank)} font-bold neon-${rank}">${data.count}</span>
                    </div>
                    <div class="bar-wrapper">
                        <div id="bar-${rank}" class="bar-fill neon-${rank}" style="height: 0%"></div>
                    </div>
                    <span class="rank-label ${getRankSize(rank)} neon-${rank}">${rank}</span>
                `;
                container.appendChild(column);

                // 延遲觸發動畫，避免頁面同時執行所有動畫
                setTimeout(() => {
                    const fill = document.getElementById(`bar-${rank}`);
                    if (fill) fill.style.height = `${fillHeight}%`;
                }, 100);
            });
        }

        /**
         * 渲染挑戰者實況日誌
         *
         * 顯示所有提交記錄，最新的在最上面
         */
        function renderList() {
            const listEl = document.getElementById('leaderboardList');
            listEl.innerHTML = "";

            // GAS 已按時間排序（最新在前），直接使用
            const allScores = scores;

            if (allScores.length === 0) {
                listEl.innerHTML = `<li class="col-span-full py-16 text-center text-slate-500 italic text-2xl font-bold">海洋正在等待新的挑戰者...</li>`;
                return;
            }

            allScores.forEach((p) => {
                const li = document.createElement('li');
                // 識別新項目（最近提交的玩家）
                const isNew = lastSubmitted &&
                              p.name === lastSubmitted.name &&
                              p.count === lastSubmitted.count;
                li.className = `flex items-center justify-between bg-white/5 p-8 rounded-[30px] hover:bg-white/10 transition-all${isNew ? ' item-new-entry' : ''}`;
                li.innerHTML = `
                    <div class="font-black text-2xl text-white">${escapeHtml(p.name)}</div>
                    <div class="oswald text-4xl font-black text-cyan-400">🎣 ${p.count}</div>
                `;
                listEl.appendChild(li);
            });

            // 動畫播完後清除 lastSubmitted 標記
            if (lastSubmitted) {
                setTimeout(() => { lastSubmitted = null; }, 600);
            }
        }

        // ============ UI 工具函式 ============

        /**
         * 防止 XSS 攻擊 — 轉義 HTML 特殊字符
         * @param {string} text - 要轉義的文本
         * @returns {string} 轉義後的文本
         */
        function escapeHtml(text) {
            // 防護：確保輸入是字符串
            if (text === null || text === undefined) return '';
            if (typeof text !== 'string') text = String(text);

            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, c => map[c]);
        }

        /**
         * 顯示 Toast 通知（替代 alert()）
         * @param {string} message - 通知內容
         * @param {string} type - 類型: 'success', 'error', 'info'
         * @param {number} duration - 顯示時長（毫秒）
         */
        function showToast(message, type = 'info', duration = 3000) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            // 自動移除
            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease-out reverse';
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        /**
         * 切換視圖（主頁 ↔ 回報 ↔ 管理）
         * @param {string} view - 目標視圖: 'main', 'input', 'admin'
         */
        function toggleView(view) {
            // 隱藏所有彈窗
            document.getElementById('inputModal').classList.add('hidden');
            document.getElementById('adminModal').classList.add('hidden');

            if (view === 'input') {
                document.getElementById('inputModal').classList.remove('hidden');
                // 重設表單
                document.getElementById('playerName').value = '';
                currentInputCount = 0;
                document.getElementById('currentCount').innerText = '0';
            } else if (view === 'admin') {
                document.getElementById('adminModal').classList.remove('hidden');
                document.getElementById('adminAuth').classList.remove('hidden');
                document.getElementById('adminPanel').classList.add('hidden');
                document.getElementById('adminPass').value = '';
            }
        }

        /**
         * 驗證管理員密碼
         * ⚠️ 目前密碼在客戶端，應改為後端驗證
         */
        function verifyAdmin() {
            const pass = document.getElementById('adminPass').value;
            if (pass === ADMIN_PASSWORD) {
                document.getElementById('adminAuth').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
            } else {
                showToast('密碼錯誤！', 'error');
            }
        }

        // ============ 成績管理 ============

        /**
         * 修改輸入計數
         * @param {number} val - 增減值（可負數）
         */
        function changeCount(val) {
            currentInputCount = Math.max(0, currentInputCount + val);
            document.getElementById('currentCount').innerText = currentInputCount;
        }

        /**
         * 提交玩家成績
         *
         * 執行流程：
         * 1️⃣ 驗證輸入（玩家名稱、成績）
         * 2️⃣ 禁用按鈕，顯示加載狀態
         * 3️⃣ 發送 POST 請求到 GAS
         * 4️⃣ 檢查是否觸發廣播（新紀錄）
         * 5️⃣ 重載排行榜或播放廣播
         */
        async function submitScore() {
            // 驗證輸入
            if (currentInputCount === 0) {
                showToast('請輸入成績（> 0）', 'error');
                return;
            }

            const name = document.getElementById('playerName').value || "無名大師";
            const btn = document.getElementById('btnSubmit');

            // 顯示加載狀態
            btn.disabled = true;
            btn.innerText = "傳送中...";

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "ADD_SCORE",
                        name: name,
                        count: currentInputCount
                    })
                });

                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }

                const responseText = await res.text();

                // 檢查是否為新紀錄
                if (currentInputCount >= 50 || (scores[0] && currentInputCount > scores[0].count)) {
                    triggerBroadcast(name, currentInputCount);
                } else {
                    showToast('回報成功！🎣', 'success');
                    // 記錄提交的玩家資料，用於動畫識別
                    lastSubmitted = { name, count: currentInputCount };
                    // 恢復按鈕狀態
                    btn.disabled = false;
                    btn.innerText = "確認送出";
                    // 重置計數器和顯示
                    currentInputCount = 0;
                    document.getElementById('currentCount').innerText = "0";
                    // 等 GAS 寫入後立即拉取新數據
                    setTimeout(fetchScores, 500);
                }
            } catch (err) {
                console.error("提交失敗:", err);
                showToast('提交失敗，請檢查網路', 'error');
                btn.disabled = false;
                btn.innerText = "確認送出";
            }
        }

        /**
         * 重置排行榜（管理員專用）
         *
         * ⚠️ 危險操作 — 二次確認
         */
        async function resetLeaderboard() {
            // 二次確認
            if (!confirm("⚠️ 確定要清空所有紀錄嗎？此動作無法復原")) return;

            const btn = document.getElementById('btnReset');
            btn.disabled = true;
            btn.innerText = "處理中...";

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "RESET",
                        key: document.getElementById('adminPass').value
                    })
                });

                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }

                const responseText = await res.text();

                if (responseText === "RESET_SUCCESS") {
                    showToast('已重置所有紀錄', 'success');
                    setTimeout(() => location.reload(), 1500);
                } else {
                    showToast('重置失敗（密鑰無效）', 'error');
                    btn.disabled = false;
                    btn.innerText = "一鍵清空所有紀錄";
                }
            } catch (err) {
                console.error("重置失敗:", err);
                showToast('網路連線失敗', 'error');
                btn.disabled = false;
                btn.innerText = "一鍵清空所有紀錄";
            }
        }

        // ============ 廣播與動畫 ============

        /**
         * 觸發新紀錄廣播
         *
         * 根據成績等級決定頭銜和評語
         * @param {string} name - 玩家名稱
         * @param {number} count - 成績
         */
        function triggerBroadcast(name, count) {
            const overlay = document.getElementById('broadcastOverlay');
            document.getElementById('b-name').innerText = escapeHtml(name);
            document.getElementById('b-count').innerText = count;

            // 根據成績分級設定頭銜
            let title = "🌊 觀浪者";
            let heckle = "只是來借廁所的吧？";

            if (count >= 100) {
                title = "👾 水缸終結者";
                heckle = "警報！水箱已爆裂，老闆準備轉行！";
            } else if (count >= 51) {
                title = "👑 義方金魚王";
                heckle = "新王登基！全場尖叫聲！";
            }

            document.getElementById('b-title').innerText = title;
            document.getElementById('b-heckle').innerText = heckle;

            // 顯示廣播 6 秒後自動重載
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            setTimeout(() => { location.reload(); }, 6000);
        }

        /**
         * 背景動畫 — 游動的魚
         *
         * 參數說明：
         * - 大小：30~70px（隨機）
         * - 速度：15~35 秒（隨機，越快越激烈）
         * - 位置：0~85% 垂直高度（避免超出視界）
         * - 上下搖晃：4 秒週期（bobbing 效果）
         */
        const fishEmojis = ['🐟', '🐠', '🐡', '🐙', '🦑', '🦐', '🦀', '🦈', '🐋', '🐳', '🧜‍♂️', '🧜‍♀️'];
        const bgContainer = document.getElementById('fishBackground');

        /**
         * 建立單隻游動的魚
         * 設定隨機大小、速度、方向、高度
         */
        function createFish() {
            const fish = document.createElement('div');
            const emoji = fishEmojis[Math.floor(Math.random() * fishEmojis.length)];
            const direction = Math.random() > 0.5 ? 'right' : 'left';

            // 大小 30~70px
            const size = Math.floor(Math.random() * 40) + 30;

            // 速度 15~35 秒橫越螢幕
            const duration = Math.floor(Math.random() * 20) + 15;

            // 高度 0~85%
            const top = Math.floor(Math.random() * 85);

            fish.className = 'bg-fish';
            fish.innerText = emoji;
            fish.style.fontSize = `${size}px`;
            fish.style.top = `${top}%`;

            // 組合橫移動畫 + 上下搖晃
            fish.style.animation = `${direction === 'right' ? 'swimRight' : 'swimLeft'} ${duration}s linear forwards, bobbing 4s ease-in-out infinite`;

            bgContainer.appendChild(fish);

            // 動畫結束後移除 DOM（避免記憶體洩漏）
            setTimeout(() => { fish.remove(); }, duration * 1000);
        }

        // ============ 初始化 & 定期更新 ============

        // 載入初始數據
        fetchScores();

        // 每 5 秒輪詢一次排行榜
        // 防止網路卡頓時過度請求（見 isLoadingScores 保護）
        setInterval(fetchScores, 5000);

        // 每 1.2 秒生成一隻魚（密度適中，不會過度渲染）
        setInterval(createFish, 1200);

        // 初始化時立即生成 10 隻魚（填滿背景）
        for (let i = 0; i < 10; i++) {
            setTimeout(createFish, Math.random() * 5000);
        }
    </script>
</body>
