<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>義方金魚王：UX 夜市及時排行系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-gold: #fbbf24;
            --neon-silver: #94a3b8;
            --neon-bronze: #b45309;
            --neon-pink: #f43f5e;
            --neon-cyan: #22d3ee;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
        }
        .neon-text-gold { text-shadow: 0 0 10px var(--neon-gold); color: var(--neon-gold); }
        .neon-border-gold { box-shadow: 0 0 15px var(--neon-gold); border-color: var(--neon-gold); }
        
        /* 領獎台長條圖動畫 */
        .podium-bar {
            transition: height 1s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            position: relative;
        }

        /* 插播遮罩 */
        #broadcastOverlay {
            display: none;
            backdrop-filter: blur(12px);
            z-index: 10000;
        }

        /* 打字機效果 */
        .typewriter {
            overflow: hidden;
            border-right: .15em solid var(--neon-cyan);
            white-space: nowrap;
            margin: 0 auto;
            letter-spacing: .15em;
            animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: var(--neon-cyan); } }

        /* 滾動條美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- 主容器 -->
    <div class="max-w-4xl mx-auto">
        
        <!-- 標題區 -->
        <header class="text-center mb-8">
            <h1 class="text-5xl font-extrabold neon-text-gold mb-2">🎣 義方金魚王</h1>
            <p class="text-slate-400">UX 夜市及時戰況看板</p>
        </header>

        <!-- 2-1-3 領獎台區域 -->
        <section id="podium" class="flex justify-center items-end gap-2 md:gap-4 h-64 mb-12 border-b-4 border-slate-700 pb-2">
            <!-- 第二名 (左) -->
            <div class="flex flex-col items-center w-24 md:w-32">
                <span id="p2-name" class="text-sm font-bold truncate w-full text-center">---</span>
                <span id="p2-count" class="text-xl font-black text-slate-300">0</span>
                <div id="p2-bar" class="podium-bar w-full bg-slate-400/40 border-t-4 border-slate-400" style="height: 0%;">
                    <div class="absolute inset-0 flex items-center justify-center text-4xl font-black opacity-20">2</div>
                </div>
            </div>
            <!-- 第一名 (中) -->
            <div class="flex flex-col items-center w-32 md:w-40">
                <div id="crown" class="animate-bounce mb-1">👑</div>
                <span id="p1-name" class="text-lg font-bold truncate w-full text-center neon-text-gold">---</span>
                <span id="p1-count" class="text-3xl font-black text-yellow-400">0</span>
                <div id="p1-bar" class="podium-bar w-full bg-yellow-500/40 border-t-4 border-yellow-400" style="height: 0%;">
                    <div class="absolute inset-0 flex items-center justify-center text-6xl font-black opacity-30">1</div>
                </div>
            </div>
            <!-- 第三名 (右) -->
            <div class="flex flex-col items-center w-24 md:w-32">
                <span id="p3-name" class="text-sm font-bold truncate w-full text-center">---</span>
                <span id="p3-count" class="text-xl font-black text-orange-600">0</span>
                <div id="p3-bar" class="podium-bar w-full bg-orange-700/40 border-t-4 border-orange-700" style="height: 0%;">
                    <div class="absolute inset-0 flex items-center justify-center text-4xl font-black opacity-20">3</div>
                </div>
            </div>
        </section>

        <!-- 下方排行榜列表 -->
        <section class="bg-slate-900/50 rounded-xl p-4 mb-8">
            <h3 class="text-slate-400 text-sm font-bold mb-4 border-b border-slate-800 pb-2">及時排行清單</h3>
            <ul id="leaderboardList" class="space-y-2">
                <!-- 列表內容由 JS 生成 -->
                <li class="flex justify-center py-8 text-slate-600">載入中...</li>
            </ul>
        </section>

        <!-- 輸入與管理按鈕 -->
        <footer class="flex justify-center gap-4">
            <button onclick="toggleView('input')" class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-full font-bold shadow-lg transition">我要報分 🎣</button>
            <button onclick="toggleView('admin')" class="bg-slate-700 hover:bg-slate-600 px-4 py-3 rounded-full text-sm">管理模式 ⚙️</button>
        </footer>
    </div>

    <!-- [隱藏視窗] 報分介面 -->
    <div id="inputModal" class="fixed inset-0 bg-black/90 hidden flex flex-col items-center justify-center p-6 z-[5000]">
        <h2 class="text-3xl font-bold mb-8">🎣 回報戰果</h2>
        <input type="text" id="playerName" placeholder="請輸入暱稱" class="bg-slate-800 border-2 border-slate-700 p-4 rounded-xl w-full max-w-sm text-center text-xl mb-6">
        
        <div class="flex items-center gap-6 mb-8">
            <button onclick="changeCount(-1)" class="w-16 h-16 bg-red-600 rounded-full text-3xl font-bold">-</button>
            <span id="currentCount" class="text-6xl font-black min-w-[100px] text-center">0</span>
            <button onclick="changeCount(1)" class="w-16 h-16 bg-green-600 rounded-full text-3xl font-bold">+</button>
        </div>

        <div class="flex gap-2 mb-8">
            <button onclick="changeCount(5)" class="bg-slate-700 px-4 py-2 rounded-lg">+5</button>
            <button onclick="changeCount(10)" class="bg-slate-700 px-4 py-2 rounded-lg">+10</button>
            <button onclick="changeCount(20)" class="bg-slate-700 px-4 py-2 rounded-lg">+20</button>
        </div>

        <div class="flex gap-4">
            <button onclick="submitScore()" id="btnSubmit" class="bg-yellow-500 text-slate-900 font-black px-12 py-4 rounded-xl text-xl">確認送出！</button>
            <button onclick="toggleView('main')" class="bg-slate-800 px-8 py-4 rounded-xl">取消</button>
        </div>
    </div>

    <!-- [隱藏視窗] 插播遮罩 -->
    <div id="broadcastOverlay" class="fixed inset-0 flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-5xl font-black neon-text-gold mb-8 animate-pulse">🎉 全場注意 🎉</h1>
        <div class="bg-white/10 p-12 rounded-3xl border-4 border-yellow-400/50 shadow-2xl scale-110">
            <h2 id="b-name" class="text-6xl font-black mb-4">玩家暱稱</h2>
            <p class="text-2xl mb-4">剛剛撈到了</p>
            <div class="text-9xl font-black text-yellow-400 mb-6"><span id="b-count">99</span><span class="text-4xl">隻</span></div>
            <h3 id="b-title" class="text-5xl font-black neon-text-gold border-4 border-yellow-400 px-8 py-4 rounded-xl inline-block">👑 稱號出現</h3>
        </div>
        <!-- 底部字幕 -->
        <div class="fixed bottom-0 left-0 w-full bg-black/80 p-8 border-t-2 border-cyan-400">
            <p id="b-heckle" class="text-3xl text-cyan-400 font-bold typewriter">「老闆說他準備要把攤位頂讓給你了...」</p>
        </div>
    </div>

    <script>
        // --- 設定區 ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwzmoyqSBEL-C4SnzHsx9x03EWEn_gKR6XE4zOtPLt-5pYTjeVgrdczlPWlSqpY9XTF/exec"; // <--- 實作時請填入您的網址
        let scores = [];
        let currentInputCount = 0;

        // --- 核心功能 ---

        async function fetchScores() {
            try {
                // 模擬數據 (實作時改為 fetch(GAS_URL))
                const res = await fetch(GAS_URL);
                scores = await res.json();
                renderPodium();
                renderList();
            } catch (err) {
                console.error("Fetch Error:", err);
                // 這裡可以放假數據測試
                scores = [
                    {name: "王小明", count: 88, title: "👑 義方金魚王"},
                    {name: "設計師", count: 52, title: "🏅 夜市常客"},
                    {name: "撈魚魔人", count: 45, title: "🏅 夜市常客"},
                    {name: "路人甲", count: 12, title: "🎣 垂釣學徒"}
                ];
                renderPodium();
                renderList();
            }
        }

        function renderPodium() {
            const p1 = scores[0] || {name: "---", count: 0};
            const p2 = scores[1] || {name: "---", count: 0};
            const p3 = scores[2] || {name: "---", count: 0};

            // 設定名稱與數字
            document.getElementById('p1-name').innerText = p1.name;
            document.getElementById('p1-count').innerText = p1.count;
            document.getElementById('p2-name').innerText = p2.name;
            document.getElementById('p2-count').innerText = p2.count;
            document.getElementById('p3-name').innerText = p3.name;
            document.getElementById('p3-count').innerText = p3.count;

            // 設定高度 (最高 100%)
            const max = p1.count || 1;
            document.getElementById('p1-bar').style.height = '100%';
            document.getElementById('p2-bar').style.height = `${(p2.count / max) * 80}%`;
            document.getElementById('p3-bar').style.height = `${(p3.count / max) * 60}%`;
        }

        function renderList() {
            const listEl = document.getElementById('leaderboardList');
            listEl.innerHTML = "";
            
            // 從第 4 名開始顯示
            const others = scores.slice(3);
            if (others.length === 0) {
                listEl.innerHTML = `<li class="text-center py-4 text-slate-500 italic">目前尚無更多挑戰者...</li>`;
                return;
            }

            others.forEach((p, index) => {
                const li = document.createElement('li');
                li.className = "flex items-center justify-between bg-slate-800/50 p-4 rounded-lg border-l-4 border-slate-700";
                li.innerHTML = `
                    <div class="flex items-center gap-4">
                        <span class="text-slate-500 font-bold w-6">#${index + 4}</span>
                        <div>
                            <div class="font-bold">${p.name}</div>
                            <div class="text-xs text-slate-400">${p.title}</div>
                        </div>
                    </div>
                    <div class="text-2xl font-black">${p.count}</div>
                `;
                listEl.appendChild(li);
            });
        }

        // --- 互動功能 ---

        function toggleView(view) {
            document.getElementById('inputModal').classList.add('hidden');
            if (view === 'input') {
                document.getElementById('inputModal').classList.remove('hidden');
            }
        }

        function changeCount(val) {
            currentInputCount = Math.max(0, currentInputCount + val);
            document.getElementById('currentCount').innerText = currentInputCount;
        }

        async function submitScore() {
            const name = document.getElementById('playerName').value || "無名大師";
            const btn = document.getElementById('btnSubmit');
            
            btn.disabled = true;
            btn.innerText = "傳送中...";

            try {
                const payload = {
                    action: "ADD_SCORE",
                    name: name,
                    count: currentInputCount
                };

                await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                // 檢查是否需要插播 (簡單邏輯：超過 50 隻或第一名)
                if (currentInputCount >= 50 || (scores[0] && currentInputCount > scores[0].count)) {
                    triggerBroadcast(name, currentInputCount);
                }

                alert("報分成功！");
                location.reload(); // 簡單起見直接刷新
            } catch (err) {
                alert("送出失敗，請檢查網路！");
                btn.disabled = false;
                btn.innerText = "確認送出！";
            }
        }

        function triggerBroadcast(name, count) {
            const overlay = document.getElementById('broadcastOverlay');
            document.getElementById('b-name').innerText = name;
            document.getElementById('b-count').innerText = count;
            
            let title = "🌊 觀浪者";
            let heckle = "「只是來借廁所的吧？」";
            if (count >= 100) { title = "👾 水缸終結者"; heckle = "「⚠️ 警報！水缸已被終結！老闆準備轉行！」"; }
            else if (count >= 51) { title = "👑 新王登基"; heckle = "「 🎉 全場注意！新任金魚王誕生！後面的請排隊簽名。」"; }
            
            document.getElementById('b-title').innerText = title;
            document.getElementById('b-heckle').innerText = heckle;

            overlay.style.display = 'flex';
            setTimeout(() => { overlay.style.display = 'none'; }, 7000);
        }

        // 頁面加載後執行
        fetchScores();
        // 每 30 秒自動更新一次
        setInterval(fetchScores, 30000);

    </script>
</body>
</html>
